spring.application.name=Kranti
server.port=${SERVER_PORT:8080}

# Database configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:kranti}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway: if schema already contains objects but no flyway history table, create baseline
spring.flyway.baseline-on-migrate=true
# Optionally, set baseline version (defaults to 1). If your initial migration is V1__init.sql, keep default.
# spring.flyway.baseline-version=1

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics,env,httptrace,threaddump,beans,conditions,loggers,mappings,httpexchanges
management.endpoint.health.show-details=always
 

# Optional: set base path (default is /actuator)
# management.endpoints.web.base-path=/actuator